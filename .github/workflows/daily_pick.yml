name: V5.7 每日选股推送

on:
  schedule:
    - cron: '15 1 * * 1-5'
  workflow_dispatch:

jobs:
  stock-picker:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests akshare
    
    - name: 运行选股脚本
      run: |
        cd ${{ github.workspace }}
        python stock_picker_v57.py
      env:
        TZ: Asia/Shanghai
    
    - name: 推送结果到微信
      run: |
        cd ${{ github.workspace }}
        python push_wechat.py
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        TZ: Asia/Shanghai
    
    - name: 保存结果
      uses: actions/upload-artifact@v4
      with:
        name: 选股结果
        path: result.json
        


